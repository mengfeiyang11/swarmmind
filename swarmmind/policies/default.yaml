# SwarmMind 默认安全策略配置

rules:
  # ==================== 高优先级：拒绝规则 ====================

  - name: deny_outside_workspace
    description: "禁止访问工作区外的资源"
    agent_role: "*"
    tool_pattern: "*"
    resource_pattern: "!workspace/office/**"
    action: deny
    priority: 100

  - name: deny_delete_operations
    description: "删除操作默认拒绝"
    agent_role: "*"
    tool_pattern: "delete_*"
    resource_pattern: "*"
    action: deny
    priority: 95

  # ==================== 中优先级：确认规则 ====================

  - name: confirm_shell_execute
    description: "Shell 命令执行需要用户确认"
    agent_role: executor
    tool_pattern: "execute_workspace_shell"
    resource_pattern: "*"
    action: confirm
    priority: 90

  - name: confirm_code_execution
    description: "代码执行需要用户确认"
    agent_role: executor
    tool_pattern: "execute_code"
    resource_pattern: "*"
    action: confirm
    priority: 88

  - name: confirm_run_script
    description: "脚本运行需要用户确认"
    agent_role: executor
    tool_pattern: "run_python_script"
    resource_pattern: "*"
    action: confirm
    priority: 87

  - name: confirm_authenticated_api
    description: "带认证的 API 调用需要确认"
    agent_role: executor
    tool_pattern: "call_api_with_auth"
    resource_pattern: "*"
    action: confirm
    priority: 85

  - name: confirm_write_file
    description: "文件覆盖写入需要确认"
    agent_role: executor
    tool_pattern: "write_workspace_file"
    resource_pattern: "*"
    action: confirm
    priority: 50

  # ==================== 低优先级：允许规则 ====================

  - name: allow_read_operations
    description: "允许所有读取操作"
    agent_role: "*"
    tool_pattern: "list_*"
    resource_pattern: "*"
    action: allow
    priority: 10

  - name: allow_time_tools
    description: "允许时间相关工具"
    agent_role: "*"
    tool_pattern: "get_current_time"
    resource_pattern: "*"
    action: allow
    priority: 10

  - name: allow_calculator
    description: "允许计算器工具"
    agent_role: "*"
    tool_pattern: "calculator"
    resource_pattern: "*"
    action: allow
    priority: 10

  - name: allow_model_info
    description: "允许获取模型信息"
    agent_role: "*"
    tool_pattern: "get_system_model_info"
    resource_pattern: "*"
    action: allow
    priority: 10

  - name: allow_test_connection
    description: "允许 API 连接测试"
    agent_role: "*"
    tool_pattern: "test_api_connection"
    resource_pattern: "*"
    action: allow
    priority: 10

  - name: allow_public_api
    description: "允许公共 API 调用"
    agent_role: executor
    tool_pattern: "call_api"
    resource_pattern: "*"
    action: allow
    priority: 10
